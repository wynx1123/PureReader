name: Build IPA

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Show Xcode version
        run: xcodebuild -version && xcodebuild -list

      - name: Build Archive (unsigned)
        run: |
          set -euo pipefail
          mkdir -p build
          xcodebuild archive \
            -project PureReader.xcodeproj \
            -scheme PureReader \
            -configuration Release \
            -archivePath ./build/PureReader.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="./build/PureReader.xcarchive/Products/Applications/PureReader.app"
          test -d "$APP_PATH"
          mkdir -p ./build/ipa/Payload
          cp -R "$APP_PATH" ./build/ipa/Payload/
          (
            cd ./build/ipa
            zip -qry PureReader-unsigned.ipa Payload
          )
          ls -lh ./build/ipa/PureReader-unsigned.ipa
          du -sh ./build/PureReader.xcarchive

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PureReader.ipa
          path: |
            ./build/ipa/PureReader-unsigned.ipa
            ./build/PureReader.xcarchive
          if-no-files-found: error
          retention-days: 14
